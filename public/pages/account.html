<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Account – JMart</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    body { padding-top:80px; }
    .account-wrap { max-width:1000px; margin:0 auto; padding:2rem 5%; }
    .acc-header { background:linear-gradient(135deg,var(--navy-light),var(--navy)); border:1px solid rgba(201,168,76,0.15); border-radius:14px; padding:2rem; margin-bottom:2rem; display:flex; align-items:center; gap:1.5rem; }
    .acc-avatar { width:70px; height:70px; background:rgba(201,168,76,0.15); border:2px solid var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; }
    .acc-name { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; }
    .acc-email { color:var(--muted); font-size:0.88rem; }
    .acc-badge { background:rgba(201,168,76,0.12); border:1px solid rgba(201,168,76,0.25); color:var(--gold); padding:0.25rem 0.7rem; border-radius:100px; font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:1px; }
    .tabs { display:flex; gap:0.5rem; margin-bottom:1.5rem; border-bottom:1px solid rgba(201,168,76,0.1); }
    .tab { padding:0.7rem 1.2rem; cursor:pointer; font-size:0.88rem; font-weight:600; color:var(--muted); border-bottom:2px solid transparent; transition:all 0.2s; }
    .tab.active { color:var(--gold); border-bottom-color:var(--gold); }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }
    /* ORDERS */
    .order-card { background:var(--navy); border:1px solid rgba(201,168,76,0.12); border-radius:12px; padding:1.3rem; margin-bottom:1rem; }
    .order-top { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:0.8rem; margin-bottom:1rem; }
    .order-id { font-weight:700; font-size:0.9rem; color:var(--gold); }
    .order-date { font-size:0.78rem; color:var(--muted); }
    .status-badge { padding:0.3rem 0.8rem; border-radius:100px; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
    .s-placed       { background:rgba(52,152,219,0.15);  color:#3498db; }
    .s-confirmed    { background:rgba(46,204,113,0.15);  color:var(--green); }
    .s-packed       { background:rgba(241,196,15,0.15);  color:#f1c40f; }
    .s-shipped      { background:rgba(230,126,34,0.15);  color:#e67e22; }
    .s-out_for_delivery { background:rgba(155,89,182,0.15); color:#9b59b6; }
    .s-delivered    { background:rgba(46,204,113,0.15);  color:var(--green); }
    .s-cancelled    { background:rgba(231,76,60,0.15);   color:var(--red); }
    .order-items-mini { display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:0.8rem; }
    .oi-chip { background:rgba(201,168,76,0.07); border:1px solid rgba(201,168,76,0.12); padding:0.3rem 0.6rem; border-radius:6px; font-size:0.78rem; }
    .order-footer { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem; }
    .cancel-btn { background:none; border:1px solid rgba(231,76,60,0.3); color:var(--red); padding:0.4rem 0.9rem; border-radius:6px; cursor:pointer; font-size:0.8rem; font-family:'DM Sans',sans-serif; transition:background 0.2s; }
    .cancel-btn:hover { background:rgba(231,76,60,0.1); }
    /* TIMELINE */
    .timeline { margin-top:0.8rem; border-top:1px solid rgba(201,168,76,0.08); padding-top:0.8rem; }
    .tl-item { display:flex; gap:0.8rem; margin-bottom:0.5rem; font-size:0.8rem; color:var(--muted); }
    .tl-dot { width:8px; height:8px; border-radius:50%; background:var(--gold); margin-top:4px; flex-shrink:0; }
    /* NO ORDERS */
    .empty-state { text-align:center; padding:4rem; color:var(--muted); }
    .empty-state div { font-size:3.5rem; margin-bottom:1rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">J<span>Mart</span></a>
  <div class="nav-right">
    <a href="/shop" class="btn-outline-nav">🛒 Shop</a>
    <button onclick="logout()" class="btn-gold">Logout</button>
  </div>
</nav>

<div class="account-wrap">
  <div class="acc-header">
    <div class="acc-avatar">👤</div>
    <div>
      <div class="acc-name" id="userName">Loading...</div>
      <div class="acc-email" id="userEmail"></div>
      <div style="margin-top:0.4rem;"><span class="acc-badge" id="userRole">user</span></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('orders',this)">📦 My Orders</div>
    <div class="tab" onclick="switchTab('profile',this)">👤 Profile</div>
  </div>

  <!-- ORDERS TAB -->
  <div class="tab-pane active" id="ordersPane">
    <div id="ordersContainer"><div class="empty-state"><div>⏳</div><p>Loading orders...</p></div></div>
  </div>

  <!-- PROFILE TAB -->
  <div class="tab-pane" id="profilePane">
    <div style="background:var(--navy);border:1px solid rgba(201,168,76,0.15);border-radius:14px;padding:1.8rem;">
      <h3 style="font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);margin-bottom:1.3rem;">Update Profile</h3>
      <div class="form-row">
        <div class="form-group"><label>Full Name</label><input type="text" id="pName"/></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="pPhone"/></div>
      </div>
      <button class="btn-gold" onclick="updateProfile()">Save Changes</button>
      <hr style="border:none;border-top:1px solid rgba(201,168,76,0.1);margin:2rem 0;"/>
      <h3 style="font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);margin-bottom:1.3rem;">Change Password</h3>
      <div class="form-group"><label>Current Password</label><input type="password" id="pOldPass"/></div>
      <div class="form-group"><label>New Password</label><input type="password" id="pNewPass"/></div>
      <button class="btn-gold" onclick="changePassword()">Change Password</button>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">JMart</div>
  <div class="footer-links"><a href="/">Home</a><a href="/shop">Shop</a></div>
  <div class="footer-copy">© 2025 JMart</div>
</footer>

<script src="/js/app.js"></script>
<script>
  if (!isLoggedIn()) window.location.href='/login';

  const user = getUser();
  document.getElementById('userName').textContent  = user?.name||'';
  document.getElementById('userEmail').textContent = user?.email||'';
  document.getElementById('userRole').textContent  = user?.role||'user';
  document.getElementById('pName').value           = user?.name||'';
  document.getElementById('pPhone').value          = user?.phone||'';

  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(tab+'Pane').classList.add('active');
  }

  const STATUS_CLASS = { placed:'s-placed',confirmed:'s-confirmed',packed:'s-packed',shipped:'s-shipped',out_for_delivery:'s-out_for_delivery',delivered:'s-delivered',cancelled:'s-cancelled' };

  async function loadOrders() {
    const data = await api.get('/orders/my');
    const cont = document.getElementById('ordersContainer');
    if (!data?.orders?.length) {
      cont.innerHTML='<div class="empty-state"><div>📦</div><p>No orders yet.</p><a href="/shop" class="btn-gold" style="text-decoration:none;display:inline-block;margin-top:1rem;">Start Shopping</a></div>';
      return;
    }
    cont.innerHTML = data.orders.map(o=>{
      const date = new Date(o.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
      const canCancel = !['shipped','out_for_delivery','delivered','cancelled'].includes(o.status);
      return `<div class="order-card">
        <div class="order-top">
          <div>
            <div class="order-id">Order #${o.orderId}</div>
            <div class="order-date">${date} • ${o.items.length} item(s) • ₹${o.total}</div>
          </div>
          <span class="status-badge ${STATUS_CLASS[o.status]||''}">${o.status.replace('_',' ')}</span>
        </div>
        <div class="order-items-mini">${o.items.map(i=>`<span class="oi-chip">${i.icon} ${i.name} ×${i.qty}</span>`).join('')}</div>
        <div class="timeline">${(o.timeline||[]).slice().reverse().slice(0,3).map(t=>`<div class="tl-item"><div class="tl-dot"></div><div>${t.message} <span style="opacity:0.6;font-size:0.72rem;">${new Date(t.timestamp).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</span></div></div>`).join('')}</div>
        <div class="order-footer">
          <div style="font-size:0.78rem;color:var(--muted);">Payment: <span style="color:var(--white);">${o.paymentMethod}</span> • ${o.paymentStatus}</div>
          ${canCancel?`<button class="cancel-btn" onclick="cancelOrder('${o._id}')">Cancel Order</button>`:''}
        </div>
      </div>`;
    }).join('');
  }

  async function cancelOrder(id) {
    if (!confirm('Are you sure you want to cancel this order?')) return;
    const data = await api.put('/orders/my/'+id+'/cancel', { reason:'Customer requested cancellation' });
    if (data?.success) { showToast('Order cancelled.'); loadOrders(); }
    else showToast(data?.message||'Could not cancel order.','error');
  }

  async function updateProfile() {
    const data = await api.put('/auth/profile', { name:document.getElementById('pName').value, phone:document.getElementById('pPhone').value });
    if (data?.success) {
      localStorage.setItem('jgm_user', JSON.stringify(data.user));
      showToast('Profile updated!');
    } else showToast(data?.message||'Update failed.','error');
  }

  async function changePassword() {
    const data = await api.put('/auth/change-password', { currentPassword:document.getElementById('pOldPass').value, newPassword:document.getElementById('pNewPass').value });
    if (data?.success) { showToast('Password changed!'); document.getElementById('pOldPass').value=''; document.getElementById('pNewPass').value=''; }
    else showToast(data?.message||'Failed.','error');
  }

  loadOrders();
</script>
</body>
</html>
