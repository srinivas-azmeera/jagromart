<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login – JagroMart</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem 1rem; background:radial-gradient(ellipse at 50% 30%,#162450,var(--navy-deep) 65%); }
    .auth-box { width:100%; max-width:440px; background:var(--navy); border:1px solid rgba(201,168,76,0.2); border-radius:18px; padding:2.5rem; }
    .auth-logo { font-family:'Playfair Display',serif; font-size:2rem; font-weight:900; color:var(--gold); text-align:center; margin-bottom:0.3rem; }
    .auth-logo span { color:var(--white); }
    .auth-sub { text-align:center; color:var(--muted); font-size:0.85rem; margin-bottom:2rem; }
    .tab-row { display:flex; border:1px solid rgba(201,168,76,0.2); border-radius:8px; overflow:hidden; margin-bottom:2rem; }
    .tab { flex:1; padding:0.7rem; text-align:center; cursor:pointer; font-size:0.88rem; font-weight:600; color:var(--muted); transition:all 0.2s; }
    .tab.active { background:rgba(201,168,76,0.12); color:var(--gold); }
    .auth-form { display:none; }
    .auth-form.active { display:block; }
    .err-msg { background:rgba(231,76,60,0.1); border:1px solid rgba(231,76,60,0.3); color:#ff6b6b; padding:0.7rem 1rem; border-radius:8px; font-size:0.85rem; margin-bottom:1rem; display:none; }
    .btn-full { width:100%; background:linear-gradient(135deg,var(--gold),var(--gold-dim)); color:var(--navy-deep); border:none; padding:1rem; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:opacity 0.2s; margin-top:0.5rem; }
    .btn-full:hover { opacity:0.88; }
    .auth-footer { text-align:center; margin-top:1.5rem; font-size:0.85rem; color:var(--muted); }
    .auth-footer a { color:var(--gold); text-decoration:none; }
  </style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">Jagro<span>Mart</span></div>
  <div class="auth-sub">Your fresh grocery store</div>

  <div class="tab-row">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('register')">Register</div>
  </div>

  <!-- LOGIN -->
  <div class="auth-form active" id="loginForm">
    <div class="err-msg" id="loginErr"></div>
    <div class="form-group"><label>Email</label><input type="email" id="lEmail" placeholder="you@example.com"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="lPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn-full" onclick="doLogin()" id="loginBtn">Login →</button>
    <div class="auth-footer"><a href="/" style="color:var(--muted);">← Back to Home</a></div>
  </div>

  <!-- REGISTER -->
  <div class="auth-form" id="registerForm">
    <div class="err-msg" id="regErr"></div>
    <div class="form-row">
      <div class="form-group"><label>Full Name</label><input type="text" id="rName" placeholder="Jagan Nayak"/></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="rPhone" placeholder="9876543210"/></div>
    </div>
    <div class="form-group"><label>Email</label><input type="email" id="rEmail" placeholder="you@example.com"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="rPass" placeholder="Min. 6 characters"/></div>
    <button class="btn-full" onclick="doRegister()" id="regBtn">Create Account →</button>
    <div class="auth-footer"><a href="/" style="color:var(--muted);">← Back to Home</a></div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  if (isLoggedIn()) window.location.href = '/account';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
    document.getElementById('loginForm').classList.toggle('active', tab==='login');
    document.getElementById('registerForm').classList.toggle('active', tab==='register');
  }

  function showErr(id, msg) { const el=document.getElementById(id); el.textContent=msg; el.style.display='block'; }
  function hideErr(id)      { document.getElementById(id).style.display='none'; }

  async function doLogin() {
    hideErr('loginErr');
    const email=document.getElementById('lEmail').value.trim();
    const pass=document.getElementById('lPass').value;
    if (!email||!pass) return showErr('loginErr','Please fill in all fields.');
    document.getElementById('loginBtn').textContent='Logging in...';
    const data = await api.post('/auth/login', {email,password:pass}, false);
    document.getElementById('loginBtn').textContent='Login →';
    if (!data?.success) return showErr('loginErr', data?.message||'Login failed.');
    setSession(data);
    window.location.href = '/account';
  }

  async function doRegister() {
    hideErr('regErr');
    const name=document.getElementById('rName').value.trim();
    const phone=document.getElementById('rPhone').value.trim();
    const email=document.getElementById('rEmail').value.trim();
    const pass=document.getElementById('rPass').value;
    if (!name||!phone||!email||!pass) return showErr('regErr','Please fill in all fields.');
    if (pass.length<6) return showErr('regErr','Password must be at least 6 characters.');
    document.getElementById('regBtn').textContent='Creating account...';
    const data = await api.post('/auth/register', {name,phone,email,password:pass}, false);
    document.getElementById('regBtn').textContent='Create Account →';
    if (!data?.success) return showErr('regErr', data?.message||'Registration failed.');
    setSession(data);
    window.location.href = '/account';
  }
</script>
</body>
</html>
